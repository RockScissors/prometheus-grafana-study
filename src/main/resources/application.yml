spring:
  datasource:
    url: jdbc:h2:mem:ticketdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa # System Administrator(시스템 관리자) 약자, 관습
    password:
    hikari:
      maximum-pool-size: 2

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true


server:
  tomcat:
    threads:
      max: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always


