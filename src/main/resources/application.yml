spring:
  datasource:
    url: jdbc:h2:mem:ticketdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa # System Administrator(시스템 관리자) 약자, 관습
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always


